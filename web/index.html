<!DOCTYPE html>
<html lang="en">
<head>
    <title>Italian Trainer</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>
    <style>
        :root {
            --bg: #f5f2ed; --bg-accent: #e8e2d9; --card: #ffffff; --text: #1c1917;
            --text-muted: #57534e; --primary: #b45309; --primary-hover: #92400e;
            --success: #15803d; --success-bg: #dcfce7; --error: #b91c1c; --error-bg: #fee2e2;
            --border: rgba(0,0,0,0.08); --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 40px -10px rgba(0,0,0,0.12); --radius: 14px; --radius-sm: 10px;
        }
        body.dark-mode {
            --bg: #1c1917; --bg-accent: #292524; --card: #292524; --text: #fafaf9;
            --text-muted: #a8a29e; --primary: #f59e0b; --primary-hover: #fbbf24;
            --success: #4ade80; --success-bg: rgba(74,222,128,0.15); --error: #f87171;
            --error-bg: rgba(248,113,113,0.15); --border: rgba(255,255,255,0.08);
            --shadow: 0 1px 3px rgba(0,0,0,0.3); --shadow-lg: 0 10px 40px -10px rgba(0,0,0,0.4);
        }
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; max-width: 640px; margin: 0 auto; padding: 24px 20px 48px; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
        h1 { font-size: 1.75rem; font-weight: 700; text-align: center; margin: 0 0 6px; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.95rem; font-weight: 500; margin-bottom: 32px; }
        .dark-mode-toggle { position: fixed; top: 16px; right: 16px; width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 1.25rem; box-shadow: var(--shadow); z-index: 1000; }
        .menu { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 24px; }
        .menu button { font-family: inherit; font-size: 0.9rem; font-weight: 600; padding: 12px 20px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; box-shadow: var(--shadow); }
        .menu button:hover { background: var(--primary); color: #fff; border-color: var(--primary); transform: translateY(-1px); }
        .menu button.stats-btn { background: var(--text-muted); color: var(--card); border-color: transparent; }
        #quiz { background: var(--card); padding: 28px 24px; border-radius: var(--radius); box-shadow: var(--shadow-lg); min-height: 360px; border: 1px solid var(--border); }
        .progress-container { height: 6px; background: var(--bg-accent); border-radius: 999px; margin: 0 0 12px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); border-radius: 999px; transition: width 0.4s; }
        .progress-text { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 16px; }
        .card { padding: 32px 24px; text-align: center; font-size: 1.75rem; font-weight: 600; margin: 16px 0; background: var(--bg-accent); border-radius: var(--radius); border: 1px solid var(--border); }
        .answer { margin: 24px 0; text-align: center; }
        input { font-family: inherit; font-size: 1.1rem; padding: 14px 18px; width: 100%; max-width: 360px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--card); color: var(--text); outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(180,83,9,0.15); }
        button { font-family: inherit; font-size: 0.9rem; font-weight: 600; padding: 12px 24px; margin: 6px; border-radius: var(--radius-sm); border: none; cursor: pointer; }
        .submit-btn { background: var(--success); color: #fff; }
        .correct { color: var(--success); font-weight: 700; font-size: 1.15rem; }
        .wrong { color: var(--error); font-weight: 700; font-size: 1.1rem; }
        .options { display: flex; flex-direction: column; gap: 10px; max-width: 480px; margin: 20px auto; }
        .option-btn { font-family: inherit; padding: 16px 20px; font-size: 1rem; font-weight: 500; text-align: left; background: var(--bg-accent); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); cursor: pointer; }
        .option-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
        .speaker { cursor: pointer; font-size: 1.4rem; margin-left: 10px; opacity: 0.85; display: inline-block; }
        .stat-card { background: var(--card); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); text-align: center; }
        .stat-number { font-size: 1.75rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; margin-top: 4px; }
        .panel { background: var(--card); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 20px; }
        .home-logo { display: block; max-width: 200px; height: auto; margin: 0 auto 20px; border-radius: var(--radius); box-shadow: var(--shadow-lg); }
        .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
        .panel table { width: 100%; border-collapse: collapse; }
        .panel th, .panel td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        footer { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 32px; }
    </style>
</head>
<body>
    <button class="dark-mode-toggle" onclick="document.body.classList.toggle('dark-mode')">&#x1F319;</button>
    <img src="/italian.webp" alt="Italian" class="home-logo" onerror="this.style.display='none'" />
    <h1>Italian Trainer</h1>
    <p class="subtitle">Scegli il tipo di pratica</p>

    <div class="menu" id="homeMenu">
        <button type="button" onclick="showVocabMenu()">Vocabolario</button>
        <button type="button" onclick="showGrammarMenu()">Grammatica</button>
        <button type="button" class="stats-btn" onclick="showStats()">Statistiche</button>
    </div>
    <div class="menu" id="vocabSubMenu" style="display:none;">
        <button onclick="startMode('it-gr')">Italiano &#x2192; Greco</button>
        <button onclick="startMode('gr-it')">Greco &#x2192; Italiano</button>
        <button onclick="startMode('mc')">Scelta multipla (IT&#x2192;GR)</button>
        <button onclick="startMode('mc-gr-it')">Scelta multipla (GR&#x2192;IT)</button>
        <button onclick="backToHome()" style="background:var(--text-muted);color:var(--card);">&#x2190; Indietro</button>
    </div>
    <div class="menu" id="grammarSubMenu" style="display:none;">
        <button onclick="startGrammarCategory('verbs_present')">Verbi al presente indicativo</button>
        <button onclick="startGrammarCategory('articles')">Articoli determinativi e indeterminativi</button>
        <button onclick="startGrammarCategory('avercela_avere_essere_esserci')">Avercela, avere, essere, esserci</button>
        <button onclick="startGrammarCategory('irregular_nouns')">Sostantivi irregolari</button>
        <button onclick="backToHome()" style="background:var(--text-muted);color:var(--card);">&#x2190; Indietro</button>
    </div>
    <div id="quiz"></div>
    <footer>Esercitati un po' ogni giorno.</footer>

<script>
"use strict";
var words = [], current = 0, score = 0, mode = "", totalAnswered = 0;
var grammarExercises = [], grammarIndex = 0, grammarScore = 0, grammarCategory = "";

function escapeHtml(t) { var d = document.createElement("div"); d.textContent = t; return d.innerHTML; }

function showVocabMenu() {
    document.getElementById("homeMenu").style.display = "none";
    document.getElementById("grammarSubMenu").style.display = "none";
    document.getElementById("vocabSubMenu").style.display = "flex";
    document.getElementById("quiz").innerHTML = "";
}
function showGrammarMenu() {
    document.getElementById("homeMenu").style.display = "none";
    document.getElementById("vocabSubMenu").style.display = "none";
    document.getElementById("grammarSubMenu").style.display = "flex";
    document.getElementById("quiz").innerHTML = "";
}
function backToHome() {
    document.getElementById("homeMenu").style.display = "flex";
    document.getElementById("vocabSubMenu").style.display = "none";
    document.getElementById("grammarSubMenu").style.display = "none";
    document.getElementById("quiz").innerHTML = "";
}

function showStats() {
    document.getElementById("homeMenu").style.display = "none";
    document.getElementById("vocabSubMenu").style.display = "none";
    document.getElementById("grammarSubMenu").style.display = "none";
    document.getElementById("quiz").innerHTML = "<div style='text-align:center;padding:40px;'>Caricamento statistiche...</div>";
    fetch("/api/stats").then(function(r) { return r.json(); }).then(function(stats) {
        var acc = stats.accuracy != null ? (Number(stats.accuracy) * 100).toFixed(1) : "0.0";
        var html = "<button onclick='backToHome()' class='submit-btn' style='margin-bottom:20px;background:var(--text);color:var(--card);'>Torna alla Home</button>";
        html += "<div style='display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;'>";
        html += "<div class='stat-card'><div class='stat-number'>" + (stats.total_words || 0) + "</div><div class='stat-label'>Parole praticate</div></div>";
        html += "<div class='stat-card'><div class='stat-number'>" + (stats.total_attempts || 0) + "</div><div class='stat-label'>Tentativi totali</div></div>";
        html += "<div class='stat-card'><div class='stat-number'>" + acc + "%</div><div class='stat-label'>Precisione</div></div></div>";
        document.getElementById("quiz").innerHTML = html;
    }).catch(function() {
        document.getElementById("quiz").innerHTML = "<p style='color:red;'>Errore nel caricamento.</p><button onclick='backToHome()' class='submit-btn'>Indietro</button>";
    });
}

function playAudio(word) {
    fetch("/api/speak?word=" + encodeURIComponent(word)).then(function(r) { return r.json(); }).then(function(data) {
        if (data.audio && data.audio.length > 0) {
            var a = new Audio("data:audio/mp3;base64," + data.audio);
            a.play().catch(function() {});
        }
    }).catch(function() {});
}

function recordResult(word, correct, quizType) {
    fetch("/api/record", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ word: word, correct: correct, quiz_type: quizType || "web" }) }).catch(function() {});
}

function startMode(m) {
    mode = m; current = 0; score = 0; totalAnswered = 0;
    document.getElementById("vocabSubMenu").style.display = "none";
    var n = (mode === "mc" || mode === "mc-gr-it") ? 300 : 10;
    fetch("/api/words?n=" + n).then(function(r) { return r.json(); }).then(function(w) {
        words = w; showQuestion();
    }).catch(function() {
        document.getElementById("quiz").innerHTML = "<p style='color:red;'>Errore nel caricamento del vocabolario.</p>";
    });
}

function showQuestion() {
    var isMC = mode === "mc" || mode === "mc-gr-it";
    if (current >= words.length) {
        var pct = words.length ? Math.round(score * 100 / (isMC ? totalAnswered : words.length)) : 0;
        var h = "<div style='text-align:center;padding:32px 24px;'><h2>Quiz completato</h2>";
        h += "<div style='font-size:3rem;font-weight:700;color:var(--primary);margin:20px 0;'>" + score + "/" + (isMC ? totalAnswered : words.length) + "</div>";
        h += "<p>" + pct + "% corretto</p>";
        h += "<button onclick='location.reload()' class='submit-btn'>Menu</button></div>";
        document.getElementById("quiz").innerHTML = h;
        if (pct >= 80 && typeof confetti === "function") { confetti({ particleCount: 100, spread: 70 }); }
        return;
    }
    var w = words[current];
    var isReverse = mode === "gr-it" || mode === "mc-gr-it";
    var question = isReverse ? w.greek : w.italian;
    var answer = isReverse ? w.italian : w.greek;
    var pp = words.length ? (current / words.length) * 100 : 0;
    var html = "<div class='progress-container'><div class='progress-bar' style='width:" + pp + "%'></div></div>";
    html += "<div class='progress-text'>Domanda " + (current + 1) + " di " + words.length + " &bull; Punteggio: " + score + " <button onclick='backToHome()' style='padding:6px 14px;background:var(--bg-accent);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-size:0.85rem;'>Ferma</button></div>";

    if (isMC) {
        var lang = isReverse ? "italian" : "greek";
        var cat = (w.category || "").trim();
        var options = [answer];
        var url = "/api/mc-options?correct=" + encodeURIComponent(answer) + "&lang=" + lang + "&count=3";
        if (cat) url += "&category=" + encodeURIComponent(cat);
        fetch(url).then(function(r) { return r.json(); }).then(function(wrongs) {
            if (Array.isArray(wrongs)) wrongs.forEach(function(x) { if (x && options.indexOf(x) === -1) options.push(x); });
        }).catch(function() {}).finally(function() {
            if (options.length < 4) {
                words.filter(function(x, i) { return i !== current; }).forEach(function(x) {
                    if (options.length < 4) { var a = isReverse ? x.italian : x.greek; if (a && options.indexOf(a) === -1) options.push(a); }
                });
            }
            options.sort(function() { return Math.random() - 0.5; });
            html += "<div class='card'>" + escapeHtml(question) + " <span class='speaker' onclick='playAudio(\"" + w.italian.replace(/"/g, "") + "\")'>&#x1F50A;</span></div>";
            html += "<div class='options'>";
            options.forEach(function(opt) {
                html += "<button class='option-btn' onclick='checkMC(this)' data-opt='" + escapeHtml(opt) + "' data-correct='" + escapeHtml(answer) + "' data-italian='" + escapeHtml(w.italian) + "'>" + escapeHtml(opt) + "</button>";
            });
            html += "</div>";
            document.getElementById("quiz").innerHTML = html;
        });
    } else {
        html += "<div class='card'>" + escapeHtml(question) + " <span class='speaker' onclick='playAudio(\"" + w.italian.replace(/"/g, "") + "\")'>&#x1F50A;</span></div>";
        html += "<div class='answer'><input type='text' id='answer' placeholder='La tua risposta' /><button onclick='checkAnswerBtn()' class='submit-btn'>Invia</button></div><div id='result'></div>";
        document.getElementById("quiz").innerHTML = html;
        var inp = document.getElementById("answer");
        if (inp) { inp.focus(); inp.onkeypress = function(e) { if (e.key === "Enter") checkAnswerBtn(); }; }
    }
}

function checkAnswerBtn() {
    var inp = document.getElementById("answer");
    if (!inp) return;
    var userAnswer = inp.value.trim();
    var correct = inp.getAttribute("data-correct") || words[current][mode === "gr-it" ? "italian" : "greek"];
    var isCorrect = userAnswer.toLowerCase() === correct.toLowerCase();
    recordResult(words[current].italian, isCorrect, mode);
    if (isCorrect) { score++; document.getElementById("result").innerHTML = "<p class='correct'>&#x2713; Corretto!</p>"; }
    else { document.getElementById("result").innerHTML = "<p class='wrong'>&#x2717; Sbagliato. Risposta: " + escapeHtml(correct) + "</p>"; }
    playAudio(words[current].italian);
    current++;
    setTimeout(showQuestion, 2000);
}

function checkMC(btn) {
    var selected = btn.getAttribute("data-opt");
    var correct = btn.getAttribute("data-correct");
    var italian = btn.getAttribute("data-italian");
    var isCorrect = selected === correct;
    totalAnswered++;
    recordResult(italian, isCorrect, "mc");
    if (isCorrect) score++;
    var res = isCorrect ? "<p class='correct'>&#x2713; Corretto!</p>" : "<p class='wrong'>&#x2717; Sbagliato. Risposta: " + escapeHtml(correct) + "</p>";
    document.getElementById("quiz").innerHTML += "<div>" + res + "</div>";
    playAudio(italian);
    current++;
    setTimeout(showQuestion, 2000);
}

function startGrammarCategory(cat) {
    grammarCategory = cat; grammarIndex = 0; grammarScore = 0;
    document.getElementById("grammarSubMenu").style.display = "none";
    document.getElementById("quiz").innerHTML = "<div style='text-align:center;padding:24px;'>Caricamento esercizi...</div>";
    fetch("/api/grammar/exercises?category=" + encodeURIComponent(cat) + "&n=20").then(function(r) { return r.json(); }).then(function(data) {
        grammarExercises = data;
        if (!grammarExercises.length) {
            document.getElementById("quiz").innerHTML = "<p style='color:var(--error);'>Nessun esercizio disponibile.</p><button onclick='backToHome()' class='submit-btn'>Indietro</button>";
            return;
        }
        showGrammarQuestion();
    }).catch(function() {
        document.getElementById("quiz").innerHTML = "<p style='color:var(--error);'>Errore nel caricamento degli esercizi.</p><button onclick='backToHome()' class='submit-btn'>Indietro</button>";
    });
}

function showGrammarQuestion() {
    if (grammarIndex >= grammarExercises.length) {
        var pct = grammarExercises.length ? Math.round(grammarScore * 100 / grammarExercises.length) : 0;
        var h = "<div style='text-align:center;padding:32px 24px;'><h2>Sessione completata</h2>";
        h += "<div style='font-size:3rem;font-weight:700;color:var(--primary);margin:20px 0;'>" + grammarScore + "/" + grammarExercises.length + "</div>";
        h += "<p>" + pct + "% corretto</p>";
        h += "<button onclick='showGrammarMenu()' class='submit-btn' style='margin:8px;'>Torna alle categorie</button>";
        h += "<button onclick='backToHome()' class='submit-btn' style='margin:8px;background:var(--text);color:var(--card);'>Home</button></div>";
        document.getElementById("quiz").innerHTML = h;
        if (pct >= 80 && typeof confetti === "function") confetti({ particleCount: 100, spread: 70 });
        return;
    }
    var ex = grammarExercises[grammarIndex];
    var pp = grammarExercises.length ? (grammarIndex / grammarExercises.length) * 100 : 0;
    var html = "<div class='progress-container'><div class='progress-bar' style='width:" + pp + "%'></div></div>";
    html += "<div class='progress-text'>Domanda " + (grammarIndex + 1) + " di " + grammarExercises.length + " &bull; Punteggio: " + grammarScore + " <button onclick='backToHome()' style='padding:6px 14px;background:var(--bg-accent);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-size:0.85rem;'>Ferma</button></div>";
    html += "<div class='card'>" + escapeHtml(ex.prompt) + "</div>";
    html += "<div class='answer'><input type='text' id='grammarAnswer' placeholder='La tua risposta' />";
    html += "<button onclick='checkGrammarAnswer()' class='submit-btn'>Invia</button></div><div id='grammarResult'></div>";
    document.getElementById("quiz").innerHTML = html;
    var inp = document.getElementById("grammarAnswer");
    if (inp) { inp.focus(); inp.onkeypress = function(e) { if (e.key === "Enter") checkGrammarAnswer(); }; }
}

function checkGrammarAnswer() {
    var inp = document.getElementById("grammarAnswer");
    if (!inp) return;
    var userAnswer = inp.value.trim();
    var ex = grammarExercises[grammarIndex];
    if (!ex) return;
    fetch("/api/grammar/check", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ category: grammarCategory, prompt: ex.prompt, user_answer: userAnswer }) })
    .then(function(r) { return r.json(); }).then(function(data) {
        var el = document.getElementById("grammarResult");
        if (data.correct) { grammarScore++; el.innerHTML = "<p class='correct'>&#x2713; Corretto!</p>"; }
        else { el.innerHTML = "<p class='wrong'>&#x2717; Sbagliato. Risposta corretta: " + escapeHtml(data.correct_answer || "") + "</p>"; }
        grammarIndex++;
        setTimeout(showGrammarQuestion, 2000);
    }).catch(function() {
        document.getElementById("grammarResult").innerHTML = "<p class='wrong'>Errore nella verifica della risposta.</p>";
    });
}
</script>
</body>
</html>
